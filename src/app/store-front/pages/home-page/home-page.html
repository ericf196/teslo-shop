<h1 class="text-3xl font-bold ">Para todo los productos {{paginationService.currentPage()}}</h1>
<h2 class="text-xl mb-3">Para todo los gustos</h2>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 mt-2 gap-3">
    @for (product of productsResource.value()?.products; track product.id) {
        <product-card [product]="product"></product-card>
    }

    @empty {
        <div class="col-span-full">
            <p>No hay productos</p>
        </div>
    }
</div>

<app-pagination [pages]="productsResource.value()?.pages ?? 0" [currentPage]="paginationService.currentPage()"></app-pagination>
