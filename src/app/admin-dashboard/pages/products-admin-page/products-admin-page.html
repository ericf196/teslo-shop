<div class="flex justify-between items-center">
  <div>
    <h1 class="text-2xl font-bold">Listado de productos</h1>
    <h3 class="text-lg font-bold">Total de productos: <span class="text-secondary">{{ totalProducts() }}</span></h3>
  </div>
  <a routerLink="/admin/products/new" class="btn btn-primary">
    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
      <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
    </svg>
    Nuevo producto
  </a>
</div>

<div class="divider"></div>

<product-table [products]="productsResource.value()?.products ?? []" />


<div class="bg-base-200 rounded-box p-4 mt-4 inline-flex flex-wrap items-center justify-between gap-4">
  <app-pagination [pages]="totalPages()" [currentPage]="currentPage()" />

  <select #selectPerPage class="select select-bordered select-sm w-auto min-w-24" aria-label="Productos por pagina"
    (change)="updateProductsPerPage(+selectPerPage.value)">
    <option value="10" selected>10</option>
    <option value="20">20</option>
    <option value="50">50</option>
    <option value="100">100</option>
  </select>
</div>
