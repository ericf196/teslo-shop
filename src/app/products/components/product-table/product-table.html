<div class="overflow-x-auto">
  <table class="table">
    <thead>
      <tr>
        <th>
          <label>
            <input type="checkbox" class="checkbox" />
          </label>
        </th>
        <th>Image</th>
        <th>Name</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Sizes</th>
        <th></th>
      </tr>
    </thead>
    <tbody>
      @for (product of products(); track product.id) {
      <tr>
        <th>
          <label>
            <input type="checkbox" class="checkbox" />
          </label>
        </th>
        <td>
          <div class="flex items-center gap-3">
            <div class="avatar">
              <div class="mask mask-squircle h-12 w-12">
                <img [src]="product.images[0] | productImage" [alt]="product.title" />
              </div>
            </div>
          </div>
        </td>
        <td>
          <a class="font-bold hover:text-accent transition-colors duration-300 cursor-pointer"
            [routerLink]="['/admin/products', product.id]">{{ product.title }}</a>
          <div class="text-sm opacity-50">{{ product.sizes.join(', ') }}</div>
        </td>
        <td>{{ product.price | currency }}</td>
        <td>{{ product.stock }}</td>
        <td>
          <div class="flex gap-1">
            @for (size of product.sizes; track size) {
            <span class="badge badge-ghost badge-sm">{{ size }}</span>
            }
          </div>
        </td>
        <th>
          <button class="btn btn-ghost btn-xs">details</button>
        </th>
      </tr>
      }
    </tbody>
    <tfoot>
      <tr>
        <th></th>
        <th>Image</th>
        <th>Name</th>
        <th>Price</th>
        <th>Stock</th>
        <th>Sizes</th>
        <th></th>
      </tr>
    </tfoot>
  </table>
</div>
